name: Pact-Rust Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: ${{ fromJSON(github.event_name == 'pull_request' && '["ubuntu-latest"]' || '["ubuntu-latest","windows-latest","macos-15"]') }}
    env:
      pact_do_not_track: true
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Install shared mime info DB
        if: runner.os == 'macOS'
        run: brew install shared-mime-info
      - name: Tests
        run: cargo test
        working-directory: rust
        env:
          RUST_LOG: debug
          RUST_BACKTRACE: 1
      - name: Build Components
        run: cargo build
        working-directory: rust
      - name: Clippy
        if: runner.os == 'Linux'
        run: cargo clippy
        working-directory: rust

  v2-engine:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      pact_do_not_track: true
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Tests
        run: cargo test
        working-directory: rust
        env:
          RUST_LOG: debug
          RUST_BACKTRACE: 1
          PACT_MATCHING_ENGINE: v2
          PACT_V2_MATCHING_LOG_EXECUTED_PLAN: 1

  musl-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: |
         docker run --rm --user "$(id -u)":"$(id -g)" -v $(pwd):/workspace -w /workspace/rust -t -e TZ=UTC pactfoundation/rust-musl-build ./scripts/ci-musl-build.sh

  check-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - run: cargo check --no-default-features
        working-directory: rust

  check-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - run: cargo build --target wasm32-wasip2
        working-directory: rust/pact_models
      - run: cargo build --target wasm32-wasip2
        working-directory: rust/pact_matching
